<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Library Management System</title>
    <script defer src="./assest/js/login.js"></script>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #F8FAFC;
        font-family: Inter, Poppins, sans-serif;
      }

      .div-container {
        width: 320px;
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .username-container {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
      }

      .username-container:focus {
        border: 1px solid #25eb2f;
      }

      #btn_id {
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.3s;
      }

      #btn_id:hover {
        background: #1d4ed8;
      }

      #error_msg {
        color: #ef4444;
        font-size: 14px;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body></body>
</html>
