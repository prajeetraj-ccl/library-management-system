<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Book Details</title>

    <link rel="stylesheet" href="./css/books.css" />
    <script defer src="./js/book-details.js"></script>
  </head>

  <body>
    <div class="header">
      <h2>Library Management System</h2>
      <a href="books.html">Back</a>
    </div>

    <div class="container">
      <h2>Book Details</h2>

      <table>
        <tr>
          <th>Book ID</th>
          <td id="bookId"></td>
        </tr>

        <tr>
          <th>Book Name</th>
          <td id="bookName"></td>
        </tr>

        <tr>
          <th>Author</th>
          <td id="author"></td>
        </tr>

        <tr>
          <th>Category</th>
          <td id="category"></td>
        </tr>

        <tr>
          <th>ISBN</th>
          <td id="isbn"></td>
        </tr>

        <tr>
          <th>Publisher</th>
          <td id="publisher"></td>
        </tr>

        <tr>
          <th>Language</th>
          <td id="language"></td>
        </tr>

        <tr>
          <th>Copies</th>
          <td id="copies"></td>
        </tr>

        <tr>
          <th>Available Copies</th>
          <td id="availableCopies"></td>
        </tr>

        <tr>
          <th>Status</th>
          <td id="status"></td>
        </tr>
        <tr>
          <th>Borrow History</th>
          <td id="borrowHistory"></td>
        </tr>
      </table>

      <br />

      <a href="books.html">
        <button>Back</button>
      </a>
    </div>
  </body>
</html>
